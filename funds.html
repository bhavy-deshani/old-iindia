    <style>
        .fund-table {
            border-collapse: separate;
            border-spacing: 0 1rem;
        }

        .fund-table thead th {
            border: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
        }

        .fund-item-row {
            background-color: #fff;
            border-radius: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .fund-item-row:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(65, 84, 128, 0.15);
            cursor: pointer;
        }

        .fund-item-row td {
            border: none;
            padding: 1.5rem;
            vertical-align: middle;
        }

        .fund-item-row td:first-child {
            border-top-left-radius: 1rem;
            border-bottom-left-radius: 1rem;
        }

        .fund-item-row td:last-child {
            border-top-right-radius: 1rem;
            border-bottom-right-radius: 1rem;
        }

        .fund-logo {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: contain;
            border: 2px solid #e8eef8;
        }

        .fund-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--tg-heading-color, #1c355e);
        }

        .fund-category-text {
            font-size: 0.9rem;
            color: #818298;
        }

        .return-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .positive-return {
            color: #10b981;
        }

        .negative-return {
            color: #ef4444;
        }

        .fund-rating i {
            color: #f59e0b;
            font-size: 0.8rem;
        }

        /* --- New Styles for Sidebar Navigation --- */
        #fund-category-sidebar.sticky-top {
            top: 100px;

        #fund-category-sidebar .nav-pills .nav-link {

            font-size: 1rem;

            background-color: #f8f9fa;

            function updatePageForCategory() {
                const hash = window.location.hash.substring(1);
                const category = decodeURIComponent(hash.replace(/-/g, ' ')) || 'Equity Funds';

                const categoryData = categoryDefinitions[category];

                if (categoryData) {
                    pageTitleEl.textContent = category;
                    pageSubtitleEl.textContent = categoryData.subtitle;
                    renderFunds(categoryData.funds);
                } else {
                    pageTitleEl.textContent = 'Category Not Found';
                    pageSubtitleEl.textContent = 'Please select a valid category.';
                    fundListContainer.innerHTML = '<p class="text-center">No data available for this category.</p>';
                }

                // Update the active button in the switcher
                categoryLinks.forEach(link => {
                    link.classList.toggle('active', link.dataset.category === category);
                });
            }

            /**
             * Renders the HTML for the fund list table.
             * @param {string[]} fundNames - An array of fund names to display.
             */
            function renderFunds(fundNames) {
                if (!fundNames || fundNames.length === 0) {
                    fundListContainer.innerHTML = '<p class="text-center">No funds to display in this category.</p>';
                    return;
                }

                let html = `
                <div class="table-responsive">
                    <table class="table fund-table">
                        <thead>
                            <tr>
                                <th scope="col" class="ps-4">Fund Name</th>
                                <th scope="col" class="text-center">1Y</th>
                                <th scope="col" class="text-center">3Y</th>
                                <th scope="col" class="text-center">5Y</th>
                                <th scope="col" class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

                fundNames.forEach(fundName => {
                    const fund = fundDetailsData[fundName] || { name: fundName, category: 'N/A', rating: 0, returns: {}, logo: '?' };

                    if (!fundDetailsData[fundName]) {
                        console.warn(`Fund details not found for: ${fundName}`);
                    };

                    const returns = fund.returns;
                    const ratingHtml = Array(5).fill(0).map((_, i) =>
                        `<i class="fas fa-star ${i < fund.rating ? '' : 'text-gray-400'}"></i>`
                    ).join('');

                    html += `
                    <tr class="fund-item-row" onclick="navigateToDetails('${fundName}')">
                        <td>
                            <div class="d-flex align-items-center">
                                <img src="https://placehold.co/50x50/00ae42/FFFFFF?text=${fund.logo}" alt="${fundName} Logo" class="fund-logo me-3">
                                <div>
                                    <div class="fund-name">${fundName}</div>
                                    <div class="d-flex align-items-center">
                                        <span class="fund-category-text me-2">${fund.category}</span>
                                        ${fund.rating > 0 ? `<span class="fund-rating small">${ratingHtml}</span>` : ''}
                                    </div>
                                </div>
                            </div>
                        </td>
                        <td class="text-center return-value ${returns['1Y'] && returns['1Y'].startsWith('-') ? 'negative-return' : 'positive-return'}">${returns['1Y'] || 'N/A'}</td>
                        <td class="text-center return-value ${returns['3Y'] && returns['3Y'].startsWith('-') ? 'negative-return' : 'positive-return'}">${returns['3Y'] || 'N/A'}</td>
                        <td class="text-center return-value ${returns['5Y'] && returns['5Y'].startsWith('-') ? 'negative-return' : 'positive-return'}">${returns['5Y'] || 'N/A'}</td>
                        <td class="text-center">
                            <button class="btn btn-invest">Invest</button>
                        </td>
                    </tr>
                `;
                });

                html += `
                        </tbody>
                    </table>
                </div>
            `;
                fundListContainer.innerHTML = html;
            }

            // --- Event Listeners ---
            window.addEventListener('hashchange', updatePageForCategory);
            updatePageForCategory(); // Initial load
        });
    </script>
</body>

</html>
