<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Funds</title>
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./assets/css/animate.min.css" />
    <link rel="stylesheet" href="./assets/css/default.css" />
    <link rel="stylesheet" fetchpriority="high" href="./assets/css/main.css" />
    <script src="./assets/js/app-link.js" defer></script>
    <style>
        .main-content-container {
            background-color: #f8f9fa;
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .comparison-card {
            background-color: #ffffff;
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: none;
            height: 100%;
            position: relative;
            border: 1px solid #e8eef8;
        }

        .fund-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--tg-heading-color, #1c355e);
        }
.btn-invest-now {
            background-color: #00ae42;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            transition: background-color 0.3s ease;
            width: 100%;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-invest-now:hover {
            background-color: #1c355e;
            color: white;
        }

        .remove-fund-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: #f1f5f9;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .remove-fund-btn:hover {
            background: #e2e8f0;
            color: #64748b;
        }

        .add-fund-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #d1d5db;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 105px;
            height: 100%;
            background-color: #f9fafb;
        }

        .add-fund-card:hover {
            background-color: #f1f5f9;
            border-color: var(--tg-theme-primary, #00ae42);
        }

        .add-fund-card .add-fund-text {
            font-weight: 600;
            color: #4b5563;
        }

        #performance-chart-container {
            background: #fff;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            position: relative;
            height: 400px;
        }

        #chart-legend {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
        }

        .legend-color-box {
            width: 12px;
            height: 12px;
            margin-right: 8px;
            border-radius: 2px;
        }

        #chart-time-buttons button {
            border: 1px solid #d1d5db;
            background-color: #fff;
            padding: 0.25rem 1rem;
            transition: all 0.2s ease;
        }

        #chart-time-buttons button.active {
            background-color: #e5e7eb;
            font-weight: 600;
        }

        .comparison-table .table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
        }

        .comparison-table .table thead th {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #f8f9fa;
        }

        .comparison-table .table td,
        .comparison-table .table th {
            text-align: center;
            vertical-align: middle;
            border-top: 1px solid #e8eef8;
            padding: 1rem 0.75rem;
        }

        .comparison-table .table tbody td:first-child,
        .comparison-table .table thead th:first-child {
            text-align: left;
            font-weight: 500;
            background-color: #fff;
            position: sticky;
            left: 0;
            z-index: 5;
            border-right: 1px solid #e8eef8;
        }

        .comparison-section-title {
            font-size: 1.1rem !important;
            font-weight: 700 !important;
            color: var(--tg-heading-color, #1c355e) !important;
            background-color: #f1f5f9 !important;
        }

        /* Modal Styles */
        #addFundModal .modal-dialog {
            max-width: 600px;
        }

        #addFundModal .modal-content {
            border-radius: 1rem;
            border: none;
        }

        #addFundModal .modal-header {
            border-bottom: 1px solid #e5e7eb;
        }

        #fund-search-results {
            max-height: 300px;
            overflow-y: auto;
        }

        .search-result-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid #e8eef8;
        }

        .search-result-item:hover {
            background-color: #f9fafb;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .popular-comparison-card {
            background-color: #fff;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .popular-comparison-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .popular-comparison-card .fund-name-small {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .popular-comparison-card .vs-text {
            color: #9ca3af;
            font-weight: 600;
            margin: 0.5rem 0;
        }

        /* --- Responsive Styles --- */
        @media (max-width: 992px) {

            #comparison-header-container table,
            #comparison-header-container thead,
            #comparison-header-container tbody,
            #comparison-header-container tr {
                display: block;
            }

            #comparison-header-container th {
                display: block;
                width: 100% !important;
                /* Override inline style */
                padding: 0.5rem 0 !important;
                border: none !important;
            }

            /* Add space between stacked cards */
            #comparison-header-container th:not(:first-child):not(:last-child) {
                margin-bottom: 1rem;
            }

            /* Hide the main title cell on mobile to save space */
            #comparison-header-container th:first-child {
                display: none;
            }

            #performance-chart-container {
                height: 300px;
                /* Reduce chart height on smaller screens */
            }

            .h4 {
                font-size: 1.25rem;
                /* Adjust heading font size */
            }
        }

        @media (max-width: 767px) {
            .main-content-container {
                padding: 1.5rem !important;
            }

            .comparison-section-title {
                font-size: 1rem !important;
            }

            .comparison-table .table td,
            .comparison-table .table th {
                padding: 0.75rem 0.5rem;
                font-size: 0.85rem;
            }

            #chart-legend {
                gap: 1rem;
            }

            .legend-item {
                font-size: 0.8rem;
            }
            
        }

        .sticky {
            top: 80px;
            z-index: 9;
        }
    </style>
</head>

            <div class="pt-5">
                <div class="main-content-container p-4 p-sm-5">

                    <!-- Summary Table -->
                    <div id="summary-table-container" class="mt-3"></div>

                    <!-- Performance Comparison Table -->
                    <div id="performance-comparison-container" class="mt-3"></div>

            </div>

                            <option value="Equity: Value">Equity: Value</option>
                            <option value="Large Cap">Large Cap</option>
                            <option value="Small Cap">Small Cap</option>
                            <option value="Mid Cap">Mid Cap</option>
                            <option value="Multicap">Multicap</option>
                            <option value="Flexicap">Flexicap</option>
                            <option value="ELSS">ELSS (Tax Saver)</option>
                            <option value="Index Fund">Index Fund</option>
                            <option value="Thematic">Thematic</option>
                            <option value="Equity Thematic">Equity Thematic</option>
                            <option value="Equity Sectoral">Equity Sectoral</option>
                        </select>
                        <input type="text" id="fund-search-input" placeholder="Search for a mutual fund"
                            class="form-control">
                        <div id="fund-search-results" class="mt-2"></div>
                    </div>
                </div>
            </div>
        </div>

    </main>

                        const notAlreadyAdded = !comparedFunds.includes(f);
                        const matchesSearch = searchTerm.length < 1 || f.toLowerCase().includes(searchTerm);
                        const matchesCategory = !selectedCategory || fundDetailsData[f].category === selectedCategory;
                        return notAlreadyAdded && matchesSearch && matchesCategory;
                    });
                    if (availableFunds.length === 0) {
                        fundSearchResults.innerHTML = '<div class="text-secondary p-3 text-center small">No funds found</div>';
                        return;
                    }
                    availableFunds.forEach(fundName => {
                        const item = document.createElement('div');
                        item.className = 'search-result-item';
                        item.innerHTML = `<div>${fundName}</div><small class="text-secondary">${fundDetailsData[fundName].category}</small>`;
                        item.addEventListener('click', () => {
                            if (comparedFunds.length < 3) {
                                comparedFunds.push(fundName);
                                if (addFundModal) addFundModal.hide();
                                renderFullComparison();
                            }
                        });
                        fundSearchResults.appendChild(item);
                    });
                }

                fundSearchInput.addEventListener('input', updateSearchResults);
                if (categoryFilter) categoryFilter.addEventListener('change', updateSearchResults);
            }

            // --- Page Load Execution ---
            initializeFundsFromURL();
            ensureDefaultFunds();
            renderFullComparison();
            renderPopularComparisons();
        });

    </script>

</body>

</html>
