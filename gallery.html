    <style>
        @media (max-width: 576px) {
            .gallery__page {
                padding: 30px 15px 65px;
            }
        }

        .gallery__warp {
            max-width: 1570px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(223px, 1fr));
            gap: 16px;
        }

        .gallery__item {
            display: block;
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .gallery__item:hover {
            transform: translateY(-5px);
        }

        .img-189 {
            max-height: 198px !important;
            object-fit: cover;
        }

        .gallery__warp img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Custom Tab Styling */
        .year-tabs .nav-link {
            background-color: #f4f7fa;
            color: #1c355e;
            border: 1px solid #e0e6ed;
            margin: 0 10px;
            border-radius: 50px;
            padding: 12px 35px;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .year-tabs .nav-link:hover {
            background-color: #e8eef8;
            border-color: #1c355e;
            transform: translateY(-2px);
        }

        .year-tabs .nav-link.active {
            background-color: #1c355e;
            color: #fff;
            border-color: #1c355e;
            box-shadow: 0 4px 15px rgba(28, 53, 94, 0.3);
        }

        .year-tabs .nav-link svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        
        .tab-content {
            margin-top: 40px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
