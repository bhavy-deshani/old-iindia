<style>
	.video-coverflow-section {
  overflow: hidden;
}



/* Slider Container */
.coverflow-container {
  width: 100%;
  margin: 0 auto;
  padding: 0 20px;
  position: relative;
}

/* Vertical Card Design (9:16 Ratio) */
.video-coverflow-slide {
  background-color: #2f3640;
  border-radius: 15px;
  overflow: hidden;
  aspect-ratio: 9/16;
  /* Mobile-style vertical card */
  position: relative;
  cursor: pointer;
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
  /* Fix for 3D effect clipping */
  transform-style: preserve-3d;
}

/* Thumbnail Image */
.coverflow-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.8);
  transition: filter 0.3s;
}

.video-coverflow-slide:hover .coverflow-image {
  filter: brightness(0.6);
}

/* Play Button Overlay */
.coverflow-play-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 60px;
  height: 60px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(4px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: white;
  border: 2px solid rgba(255, 255, 255, 0.8);
  transition: all 0.3s;
  z-index: 2;
}

.video-coverflow-slide:hover .coverflow-play-icon {
  background: var(--tg-theme-primary);
  /* Your brand color */
  border-color: var(--tg-theme-primary);
  transform: translate(-50%, -50%) scale(1.1);
}

/* Info at bottom */
.coverflow-info {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 20px;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.95), transparent);
  color: white;
  box-sizing: border-box;
  text-align: left;
}

.coverflow-info h3 {
  margin: 0;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
}

.coverflow-info p {
  margin: 5px 0 0 0;
  font-size: 14px;
  opacity: 0.8;
  color: #ccc;
}

/* Navigation Buttons */
.coverflow-next,
.coverflow-prev {
  background: rgb(206 216 233);
  width: 50px;
  height: 50px;
  border-radius: 50%;
  backdrop-filter: blur(10px);
}

.coverflow-next {
  top: 50%;
  right: -10%;
}

.coverflow-prev {
  top: 50%;
  left: -10%;
}

.coverflow-next:after,
.coverflow-prev:after {
  font-size: 20px !important;
  font-weight: bold;
}

/* --- VIDEO MODAL (POPUP) --- */
.video-modal {
  display: none;
  position: fixed;
  z-index: 9999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.95);
  justify-content: center;
  align-items: center;
}

.video-modal.active {
  display: flex;
}

.modal-video-wrapper {
  position: relative;
  height: 85vh;
  aspect-ratio: 9/16;
  /* Matches vertical video */
  background: #000;
  box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
  border-radius: 12px;
  overflow: hidden;
}

/* If videos are mostly horizontal, you can change above line to: aspect-ratio: 16/9; */

.modal-video-wrapper video {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.modal-close-btn {
  position: absolute;
  top: 30px;
  right: 40px;
  color: white;
  font-size: 50px;
  cursor: pointer;
  z-index: 10000;
  line-height: 1;
  transition: color 0.3s;
}

.modal-close-btn:hover {
  color: var(--tg-theme-primary);
}

</style>
<section class="video-coverflow-section pb-50 pt-50">
			<div class="container ">
				<div class="section-title mb-50 text-center tg-heading-subheading animation-style3">
					<h2 class="title tg-element-title">Customer Testimonials</h2>
				</div>
				<div class="coverflow-container ">
					<div class="swiper myCoverflowSwiper overflow-hidden">
						<div class="swiper-wrapper" id="coverflowWrapper"></div>

					</div>
					<div class="swiper-button-next coverflow-next"></div>
					<div class="swiper-button-prev coverflow-prev"></div>
				</div>
			</div>
		</section>
		<div class="video-modal" id="videoPopup">
			<span class="modal-close-btn" onclick="closeVideoModal()">&times;</span>
			<div class="modal-video-wrapper">
				<video id="popupPlayer" controls>
					<source src="" type="video/mp4">
				</video>
			</div>
		</div>
        	<script>
		/* --- CUSTOMER DATA CONFIGURATION --- */
		const customers = [
			{ name: "Mr G Kesoraam Behala", image: "assets/img/video/poster-8.jpg", video: "assets/img/video/video8.mp4" },
			{ name: "Mr. Kumar Araghya", image: "assets/img/video/poster-9.jpg", video: "assets/img/video/video9.mp4" },
			{ name: "R. Subramaniam", image: "assets/img/video/poster-10.jpg", video: "assets/img/video/video10.mp4" },
			{ name: "Latha Sundararajan", image: "assets/img/video/poster-11.jpg", video: "assets/img/video/video11.mp4" },
			{ name: "Shruti Jubaputra", image: "assets/img/video/poster-12.jpg", video: "assets/img/video/video12.mp4" },
			{ name: "P.S. Jagannatha", image: "assets/img/video/poster-13.jpg", video: "assets/img/video/video13.mp4" },
			{ name: "Srikala Guru Krishna", image: "assets/img/video/poster-14.jpg", video: "assets/img/video/video14.mp4" },
			{ name: "Parth Mehta", image: "assets/img/video/poster-1.jpg", video: "assets/img/video/video1.mp4" },
			{ name: "Dhanashree Kumbhalwar", image: "assets/img/video/poster-2.jpg", video: "assets/img/video/video2.mp4" },
			{ name: "Mudaliar Segar", image: "assets/img/video/poster-3.jpg", video: "assets/img/video/video3.mp4" },
			{ name: "Parth Patel", image: "assets/img/video/poster-4.jpg", video: "assets/img/video/video4.mp4" },
			{ name: "Ronak Dave", image: "assets/img/video/poster-5.jpg", video: "assets/img/video/video5.mp4" },
			{ name: "Dr Ishwarya R", image: "assets/img/video/poster-6.jpg", video: "assets/img/video/video6.mp4" },
			{ name: "DR Shivalingappa", image: "assets/img/video/poster-7.jpg", video: "assets/img/video/video7.mp4" },
		];

		/* --- GENERATE SLIDES --- */
		const wrapper = document.getElementById('coverflowWrapper');
		const modalPopup = document.getElementById('videoPopup');
		const player = document.getElementById('popupPlayer');

		wrapper.innerHTML = customers.map(item => `
        <div class="swiper-slide video-coverflow-slide" onclick="openVideoModal('${item.video}')">
            <img src="${item.image}" class="coverflow-image" alt="${item.name}">
            <div class="coverflow-play-icon"><i class="fas fa-play" style="font-size: 20px;"></i></div>
            <div class="coverflow-info">
                <h3>${item.name}</h3>
                <p>Happy Investor</p>
            </div>
        </div>
    `).join('');

		/* --- INITIALIZE SWIPER (EXACT SETTINGS) --- */
		var coverflowSwiper = new Swiper(".myCoverflowSwiper", {
			effect: "coverflow",
			grabCursor: true,
			centeredSlides: true,
			slidesPerView: "auto",
			initialSlide: 2, // Start in the middle
			coverflowEffect: {
				rotate: 0,
				stretch: 0,
				depth: 100,
				modifier: 2,
				slideShadows: true,
			},
			breakpoints: {
				320: { slidesPerView: 1.5, spaceBetween: 20 }, // Mobile
				768: { slidesPerView: 3, spaceBetween: 30 },   // Tablet
				1024: { slidesPerView: 5, spaceBetween: 40 },  // Desktop
			},
			loop: true,
			navigation: {
				nextEl: ".coverflow-next",
				prevEl: ".coverflow-prev",
			},
			pagination: {
				el: ".swiper-pagination",
				clickable: true,
			},
		});

		/* --- MODAL FUNCTIONS --- */
		function openVideoModal(url) {
			modalPopup.classList.add('active');
			player.src = url;
			player.play();
		}

		function closeVideoModal() {
			modalPopup.classList.remove('active');
			player.pause();
			player.src = ""; // Stop buffering
		}

		// Close on background click
		modalPopup.addEventListener('click', (e) => {
			if (e.target === modalPopup) closeVideoModal();
		});
	</script>
