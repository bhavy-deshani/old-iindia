<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vertical Video Slider</title>
  <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
  <style>
    :root {
      --primary-color: #3498db;
      --secondary-color: #2c3e50;
      --accent-color: #e74c3c;
      --text-light: #ecf0f1;
      --text-dark: #2c3e50;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      color: var(--text-dark);
      padding: 20px;
    }

    .video-slider-container {
      max-width: 1200px;
      margin: 50px auto;
    }

    .video-section-title {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.5rem;
      color: var(--secondary-color);
      position: relative;
    }

    .video-section-title::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 4px;
      background-color: var(--accent-color);
      border-radius: 2px;
    }

    .video-swiper {
      width: 100%;
      height: 80vh;
      padding: 30px 0;
    }

    .video-swiper-slide {
      width: 30%;
      height: 100%;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .video-swiper-slide:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .video-slide-active {
      transform: scale(1.05);
      z-index: 10;
    }

    .video-box {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .video-box video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-slide-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      color: var(--text-light);
      z-index: 10;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.5s ease;
    }
.swiper-slide-active .video-slide-content {
    transform: translateY(0);
    opacity: 1;
}


    .video-title {
      font-size: 1.2rem;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .video-description {
      font-size: 0.9rem;
      margin-bottom: 15px;
      line-height: 1.4;
    }

    .video-play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background-color: rgba(231, 76, 60, 0.8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s ease;
    }

    .video-play-btn:hover {
      background-color: rgba(231, 76, 60, 1);
      transform: translate(-50%, -50%) scale(1.1);
    }

    .video-play-btn::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      border-left: 20px solid white;
      margin-left: 4px;
    }

    .video-pagination {
      bottom: 10px !important;
    }

    .video-pagination-bullet {
      width: 10px;
      height: 10px;
      background-color: rgba(255, 255, 255, 0.5);
      opacity: 1;
      margin: 0 6px !important;
    }

    .video-bullet-active {
      background-color: var(--accent-color);
      transform: scale(1.2);
    }

    .video-button-next,
    .video-button-prev {
      color: var(--text-light);
      background-color: rgba(0, 0, 0, 0.5);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .video-button-next:hover,
    .video-button-prev:hover {
      background-color: rgba(231, 76, 60, 0.8);
    }

    .video-button-next::after,
    .video-button-prev::after {
      font-size: 1.2rem;
    }

    @media (max-width: 1024px) {
      .video-swiper-slide {
        width: 45%;
      }
    }

    @media (max-width: 768px) {
      .video-swiper {
        height: 70vh;
      }

      .video-swiper-slide {
        width: 70%;
      }

      .video-slide-content {
        padding: 15px;
      }

      .video-title {
        font-size: 1rem;
      }

      .video-description {
        font-size: 0.8rem;
      }

      .video-play-btn {
        width: 50px;
        height: 50px;
      }
    }

    @media (max-width: 480px) {
      .video-swiper {
        height: 60vh;
      }

      .video-swiper-slide {
        width: 80%;
      }
    }
  </style>

					new Date().getTime(), event: 'gtm.js'

</head>
<body>
	<!-- Google Tag Manager (noscript) -->
	<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PT9GLCS" height="0" width="0"
			style="display:none;visibility:hidden"></iframe></noscript>

  <div class="video-slider-container">
    <h2 class="video-section-title">Vertical Videos</h2>

    <div class="video-swiper swiper">
      <div class="video-swiper-wrapper swiper-wrapper">

        <!-- Slide 1 -->
        <div class="video-swiper-slide swiper-slide">
          <div class="video-box">
            <video loop muted>
              <source src="./assets/img/video/video1.mp4" type="video/mp4">
            </video>
            <div class="video-play-btn"></div>
            <div class="video-slide-content">
              <h3 class="video-title">Parth Mehta</h3>
            </div>
          </div>
        </div>

        <!-- Repeat other slides similarly -->
        <div class="video-swiper-slide swiper-slide">
          <div class="video-box">
            <video loop muted>
              <source src="./assets/img/video/video2.mp4" type="video/mp4">
            </video>
            <div class="video-play-btn"></div>
            <div class="video-slide-content">
              <h3 class="video-title">Dhanashree Kumbhalwar</h3>
            </div>
          </div>
        </div>

        <div class="video-swiper-slide swiper-slide">
          <div class="video-box">
            <video loop muted>
              <source src="./assets/img/video/video3.mp4" type="video/mp4">
            </video>
            <div class="video-play-btn"></div>
            <div class="video-slide-content">
              <h3 class="video-title">Mudaliar Segar</h3>
            </div>
          </div>
        </div>

        <div class="video-swiper-slide swiper-slide">
          <div class="video-box">
            <video loop muted>
              <source src="./assets/img/video/video4.mp4" type="video/mp4">
            </video>
            <div class="video-play-btn"></div>
            <div class="video-slide-content">
              <h3 class="video-title">Parth Patel</h3>
            </div>
          </div>
        </div>

        <div class="video-swiper-slide swiper-slide">
          <div class="video-box">
            <video loop muted>
              <source src="./assets/img/video/video5.mp4" type="video/mp4">
            </video>
            <div class="video-play-btn"></div>
            <div class="video-slide-content">
              <h3 class="video-title">Ronak Dave</h3>
            </div>
          </div>
        </div>

      </div>

      <!-- Add pagination -->
      <div class="video-pagination swiper-pagination"></div>

      <!-- Add navigation buttons -->
      <div class="video-button-next swiper-button-next"></div>
      <div class="video-button-prev swiper-button-prev"></div>
    </div>
  </div>

  <script src="https://unpkg.com/swiper/swiper-bundle.min.js" defer ></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const swiper = new Swiper('.video-swiper', {
        slidesPerView: 3,
        spaceBetween: 20,
        centeredSlides: true,
        loop: true,
        direction: 'horizontal',
        autoplay: {
          delay: 3000,
          disableOnInteraction: true
        },
        breakpoints: {
          320: { slidesPerView: 1, spaceBetween: 10 },
          768: { slidesPerView: 2, spaceBetween: 15 },
          1024: { slidesPerView: 3, spaceBetween: 20 }
        },
        pagination: {
          el: '.video-pagination',
          clickable: true
        },
        navigation: {
          nextEl: '.video-button-next',
          prevEl: '.video-button-prev'
        }
      });

      const videos = document.querySelectorAll('.video-box video');
      const playButtons = document.querySelectorAll('.video-play-btn');

      function pauseOtherVideos(currentVideo) {
        videos.forEach(video => {
          if (video !== currentVideo && !video.paused) {
            video.pause();
            video.currentTime = 0;
            video.muted = true;
            const btn = video.closest('.video-box').querySelector('.video-play-btn');
            btn.style.opacity = '1';
          }
        });
      }

      playButtons.forEach((btn, index) => {
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          const video = videos[index];
          const slide = btn.closest('.swiper-slide');

          if (!slide.classList.contains('swiper-slide-active')) return;

          if (video.paused) {
            pauseOtherVideos(video);
            swiper.autoplay.stop();
            video.play().then(() => {
              video.muted = false;
              btn.style.opacity = '0';
            }).catch(error => {
              video.muted = true;
              video.play();
              btn.style.opacity = '0';
              console.log("Autoplay with sound was blocked:", error);
            });
          } else {
            video.pause();
            btn.style.opacity = '1';
            swiper.autoplay.start();
          }
        });
      });

      swiper.on('slideChange', function () {
        videos.forEach(video => {
          video.pause();
          video.currentTime = 0;
          video.muted = true;
        });
        playButtons.forEach(btn => btn.style.opacity = '1');
        swiper.autoplay.start();
      });

      videos.forEach(video => {
        video.addEventListener('ended', function () {
          const btn = this.closest('.video-box').querySelector('.video-play-btn');
          btn.style.opacity = '1';
          swiper.autoplay.start();
        });
      });

      document.querySelector('.video-swiper').addEventListener('click', function (e) {
        const activeSlide = document.querySelector('.swiper-slide-active');
        if (activeSlide && e.target.closest('.swiper-slide-active')) {
          const btn = activeSlide.querySelector('.video-play-btn');
          btn.click();
        }
      });
    });
  </script>
</body>
</html>
