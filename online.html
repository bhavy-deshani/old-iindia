    <style>
   
        
        .main-container {
            padding: 10px !important;
            /* New AI Generated Background */
            background-image: url('assets/img/premium_finance_bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            z-index: 1;
            margin: auto;
            width: 100%;        }

        /* Light frosted glass overlay over the background for better text contrast */
        .main-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: -1;
        }

       

        .brand-logo {
            max-width: 220px;
            height: auto;
            margin-bottom: 10px;
        }

        .welcome-title {
            color: #1c355e;
            font-weight: 700;
            font-size: 32px;
            margin-top: 8px;
            margin-bottom: 3px;
        }

        .welcome-subtitle {
            color: #6c757d;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: 400;
        }

        .options-container {
            margin-top: 15px;
        }

        .login-option {
            border: 2px solid #eef1f5;
            border-radius: 24px;
            padding: 20px 20px 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            background: #ffffff;
            height: 100%;
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        .card-glow-effect {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .blue-glow { background: rgba(0, 95, 167, 0.4); }
        .green-glow { background: rgba(0, 174, 66, 0.4); }

        .login-option:hover .card-glow-effect {
            opacity: 1;
        }

        img.mockup-img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .login-option h4 {
            font-size: 26px;
            font-weight: 800;
            color: #1c355e;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .login-option p {
            font-size: 15px;
            color: #6c757d;
            margin-bottom: 15px;
            font-weight: 400;
            text-align: center;
            line-height: 1.5;
        }

        .cta-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            margin-top: auto;
        }

        .cta-btn i {
            transition: transform 0.3s ease;
        }

        .cta-blue {
            background: rgba(0, 95, 167, 0.05);
            color: #005FA7;
        }

        .cta-green {
            background: rgba(0, 174, 66, 0.05);
            color: #00ae42;
        }

        /* I Invest (Blue Theme) */
        .option-blue:hover {
            border-color: #005FA7;
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 95, 167, 0.15);
        }
        .option-blue:hover img.mockup-img {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(0, 95, 167, 0.2);
        }
        .option-blue:hover .cta-blue {
            background: #005FA7;
            color: #ffffff;
            box-shadow: 0 5px 15px rgba(0, 95, 167, 0.3);
        }
        .option-blue:hover .cta-btn i {
            transform: translateX(5px);
        }

        /* I Invest Pro (Green Theme) */
        .option-green:hover {
            border-color: #00ae42;
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 174, 66, 0.15);
        }
        .option-green:hover img.mockup-img {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(0, 174, 66, 0.2);
        }
        .option-green:hover .cta-green {
            background: #00ae42;
            color: #ffffff;
            box-shadow: 0 5px 15px rgba(0, 174, 66, 0.3);
        }
        .option-green:hover .cta-btn i {
            transform: translateX(5px);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-down {
            animation: fadeInDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .animate-fade-in-up {
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }

        /* Responsive */
        @media (max-width: 767.98px) {
            .login-wrapper {
                padding: 40px 20px;
            }
            .welcome-title {
                font-size: 28px;
            }
            .login-option {
                padding: 25px 20px;
            }
        }
    </style>
</head>

<body>

   <main>
<script src="assets/js/header.js"></script>
<script src="assets/js/footer.js"></script>
    <div class="container-fluid d-flex justify-content-center main-container">
        <div class="container pb-3">

            <!-- Top Side: Logo & Welcome -->
            <div class="logo-section animate-fade-in-down text-center my-3">
                <!-- <img src="assets/img/integrated_enterprises_india_pvt_ltd.png" alt="Integrated Logo" class="brand-logo mx-auto d-block"> -->
                <h2 class="welcome-title">Welcome to Integrated</h2>
                <p class="welcome-subtitle">Select your preferred platform to continue logging in.</p>
            </div>

            <!-- Bottom Side: 2 Options -->
            <div class="options-container">
                <div class="row g-4 justify-content-center">
                    
                    <!-- Option 1: I Invest (#005FA7) -->
                    <!-- Redirects to: https://breeze.integrated.investments/ -->
                    <div class="col-md-6 col-lg-6 animate-fade-in-up delay-200">
                        <a href="https://breeze.integrated.investments/" class="login-option option-blue text-decoration-none">
                            <div class="card-glow-effect blue-glow"></div>
                            <img src="assets/img/mockup-2.png" alt="Existing Portal Mockup" class="mockup-img mx-auto d-block" loading="lazy" decoding="async">
                            <p>Click here to use our existing portal</p>
                            <div class="cta-btn cta-blue mt-3">
                                <span>Login Here</span>
                                <i class="fa-solid fa-arrow-right"></i>
                            </div>
                        </a>
                    </div>
                    
                    <!-- Option 2: I Invest Pro (#00ae42) -->
                    <!-- Redirects to: https://webapp.integrated.investments/nv1/login/login.html?V=2.0.1 -->
                    <div class="col-md-6 col-lg-6 animate-fade-in-up delay-300">
                        <a href="https://webapp.integrated.investments/nv1/login/login.html?V=2.0.1" class="login-option option-green text-decoration-none">
                            <div class="card-glow-effect green-glow"></div>
                            <img src="assets/img/mockup-1.png" alt="Soon To Be Launched Portal Mockup" class="mockup-img mx-auto d-block" loading="lazy" decoding="async">
                            <p>Click here to have a first look of our soon to be launched investment portal with new features & design</p>
                            <div class="cta-btn cta-green mt-3">
                                <span>Login Here</span>
                                <i class="fa-solid fa-arrow-right"></i>
                            </div>
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
   </main>

    <script>
        $(document).ready(function () {
            // Simple jQuery animation effect on options
            $('.login-option').on('mousedown', function () {
                $(this).css('transform', 'scale(0.98)');
            }).on('mouseup mouseleave', function () {
                $(this).css('transform', '');
            });
        });
    </script>
