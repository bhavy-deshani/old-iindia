<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Testimonial Slider</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary-color: #ff4757;
            --dark-bg: #1e272e;
            --card-bg: #2f3640;
            --text-color: #f1f2f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Slider Container limits */
        .slider-section {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
        }

        /* The Card Design (Vertical for your image type) */
        .swiper-slide {
            background-color: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            /* Aspect Ratio for Vertical Video (9:16) */
            aspect-ratio: 9/16; 
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .swiper-slide:hover {
            transform: translateY(-5px);
        }

        /* Thumbnail Image */
        .slide-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures your photo covers the whole card */
            filter: brightness(0.8);
            transition: filter 0.3s;
        }

        .swiper-slide:hover .slide-image {
            filter: brightness(0.6);
        }

        /* Play Button Overlay */
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: white;
            opacity: 0.9;
            transition: transform 0.3s;
        }

        .swiper-slide:hover .play-icon {
            transform: translate(-50%, -50%) scale(1.2);
            color: var(--primary-color);
        }
        
        .slide-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            color: white;
            box-sizing: border-box;
        }

        .slide-info h3 {
            margin: 0;
            font-size: 1.1rem;
        }
        
        .slide-info p {
            margin: 5px 0 0 0;
            font-size: 0.85rem;
            opacity: 0.8;
        }

        /* Navigation Buttons (Arrows) */
        .swiper-button-next, .swiper-button-prev {
            color: var(--primary-color);
            background: rgba(255,255,255,0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            backdrop-filter: blur(5px);
        }
        .swiper-button-next:after, .swiper-button-prev:after {
            font-size: 20px;
            font-weight: bold;
        }

        /* --- MODAL (POPUP) STYLES --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }

        .video-wrapper {
            position: relative;
            /* Adjust width based on video type. For vertical video, use simpler width */
            height: 80vh; 
            aspect-ratio: 9/16;
            background: #000;
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.3);
        }
        
        /* If using horizontal video inside modal, uncomment this: */
        /* .video-wrapper { width: 80%; height: auto; aspect-ratio: 16/9; } */

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <h1>Happy Clients (15)</h1>

    <div class="slider-section">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="swiperWrapper">
                </div>
            
            <div class="swiper-pagination"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </div>

    <div class="modal" id="videoModal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="video-wrapper">
            <video id="mainPlayer" controls>
                <source src="" type="video/mp4">
            </video>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    /* --- JAVASCRIPT --- */



    const testimonials = [
        { name: "Client 1",  image: "poster-1.jpg", videoUrl: "video1.mp4" },
        { name: "Client 2",  image: "poster-1.jpg", videoUrl: "video2.mp4" },
        { name: "Client 3",  image: "poster-1.jpg", videoUrl: "video3.mp4" },
        { name: "Client 4",  image: "poster-1.jpg", videoUrl: "video4.mp4" },
        { name: "Client 5",  image: "poster-1.jpg", videoUrl: "video5.mp4" },
        { name: "Client 6",  image: "poster-1.jpg", videoUrl: "video6.mp4" },
        { name: "Client 7",  image: "poster-1.jpg", videoUrl: "video7.mp4" },
        { name: "Client 8",  image: "poster-1.jpg", videoUrl: "video8.mp4" },
        { name: "Client 9",  image: "poster-1.jpg", videoUrl: "video9.mp4" },
        { name: "Client 10", image: "poster-1.jpg", videoUrl: "video10.mp4" },
        { name: "Client 11", image: "poster-1.jpg", videoUrl: "video11.mp4" },
        { name: "Client 12", image: "poster-1.jpg", videoUrl: "video12.mp4" },
        { name: "Client 13", image: "poster-1.jpg", videoUrl: "video13.mp4" },
        { name: "Client 14", image: "poster-1.jpg", videoUrl: "video14.mp4" },
        { name: "Client 15", image: "poster-1.jpg", videoUrl: "video15.mp4" },
    ];

    const swiperWrapper = document.getElementById('swiperWrapper');
    const modal = document.getElementById('videoModal');
    const mainPlayer = document.getElementById('mainPlayer');

    // Generate Slides from the list above
    swiperWrapper.innerHTML = testimonials.map(item => `
        <div class="swiper-slide" onclick="openModal('${item.videoUrl}')">
            <img src="${item.image}" class="slide-image" alt="${item.name}">
            <div class="play-icon">▶</div>
            <div class="slide-info">
                <h3>${item.name}</h3>
                <p>Happy Client</p>
            </div>
        </div>
    `).join('');

    // Initialize Swiper Slider (Same settings as before)
    var swiper = new Swiper(".mySwiper", {
        effect: "coverflow",
        grabCursor: true,
        centeredSlides: true,
        slidesPerView: "auto",
        coverflowEffect: {
            rotate: 0,
            stretch: 0,
            depth: 100,
            modifier: 2,
            slideShadows: true,
        },
        breakpoints: {
            320: { slidesPerView: 1.5, spaceBetween: 20 },
            768: { slidesPerView: 3, spaceBetween: 30 },
            1024: { slidesPerView: 4, spaceBetween: 40 },
        },
        loop: true,
        navigation: {
            nextEl: ".swiper-button-next",
            prevEl: ".swiper-button-prev",
        },
        pagination: {
            el: ".swiper-pagination",
            clickable: true,
        },
    });

    // Modal Functions
    function openModal(url) {
        modal.classList.add('active');
        mainPlayer.src = url;
        mainPlayer.play();
    }

    function closeModal() {
        modal.classList.remove('active');
        mainPlayer.pause();
        mainPlayer.src = "";
    }

    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
</script>
</body>
</html>
