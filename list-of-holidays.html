    <style>
        :root {
            --accent-color: #4fc3f7;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --border-radius: 8px;
            --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }



        .search-container {
            display: flex;
            /* gap: 10px; */
            /* margin-bottom: 20px; */
        }

        .search-input {
            flex: 1;
            /* padding: 12px 15px; */
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 16px;
            transition: var(--transition);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.25);
        }

        #toggleFilters {
            background-color: transparent;
            color: #1C355E;
            border: 1px solid #1C355E;
            margin-bottom: 15px;
        }

        #toggleFilters:hover {
            color: white !important;
        }

        #filterSection {
            background-color: white;
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            margin-bottom: 20px;
            transition: var(--transition);
        }

        #filterSection.collapsed {
            display: none;
        }

        .filter-row {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .search-group {
            flex: 2;
            min-width: 300px;
        }

        .search-container {
            display: flex;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 16px;
        }

        @media (max-width: 992px) {
            .filter-row {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group,
            .search-group {
                min-width: 100%;
            }

            .search-container {
                flex-direction: column;
            }

            .search-container .btn {
                width: 100%;
            }
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark-color);
        }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 16px;
        }

        #holidayContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .holiday-card {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 20px;
            transition: var(--transition);
        }

        .holiday-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .holiday-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .holiday-day {
            font-weight: 600;
            color: #1C355E;
            font-size: 18px;
        }

        .holiday-date {
            color: #666;
            font-size: 14px;
        }

        .holiday-name {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 15px;
            color: var(--dark-color);
        }

        .holiday-regions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .region-tag {
            background-color: #e9ecef;
            color: #495057;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .national-badge,
        .region-tag.national {
            padding: 5px;
            border-radius: 10px;
            font-size: 13px;
            background-color: #00AE42;
            color: white;
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 40px;
            color: #666;
        }

        .no-results i {
            font-size: 50px;
            color: #ccc;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .filter-row {
                flex-direction: column;
                gap: 10px;
            }

            .filter-group {
                width: 100%;
            }

            #holidayContainer {
                grid-template-columns: 1fr;
            }
        }

        const holidayContainer = document.getElementById('holidayContainer');
        const monthFilter = document.getElementById('monthFilter');
        const regionFilter = document.getElementById('regionFilter');
        const searchInput = document.getElementById('searchInput');
        const searchButton = document.getElementById('searchButton');
        const resetButton = document.getElementById('resetButton');
        const filterSection = document.getElementById('filterSection');
        const toggleFiltersBtn = document.getElementById('toggleFilters');

        // Display all holidays initially
        displayHolidays(holidays);

        // Event listeners
        monthFilter.addEventListener('change', filterHolidays);
        regionFilter.addEventListener('change', filterHolidays);
        searchButton.addEventListener('click', filterHolidays);
        resetButton.addEventListener('click', resetFilters);
        toggleFiltersBtn.addEventListener('click', toggleFilters);
        searchInput.addEventListener('keyup', function (e) {
            if (e.key === 'Enter') filterHolidays();
        });

        // Filter holidays
        function filterHolidays() {
            const selectedMonth = monthFilter.value;
            const selectedRegion = regionFilter.value;
            const searchTerm = searchInput.value.toLowerCase();

            const filteredHolidays = holidays.filter(holiday => {
                if (selectedMonth && holiday.month !== selectedMonth) return false;
                if (selectedRegion && !holiday.regions.includes(selectedRegion)) return false;
                if (searchTerm && !holiday.name.toLowerCase().includes(searchTerm)) return false;
                return true;
            });

            displayHolidays(filteredHolidays);
        }

        // Reset all filters
        function resetFilters() {
            monthFilter.value = '';
            regionFilter.value = '';
            searchInput.value = '';
            displayHolidays(holidays);
        }

        // Toggle filter visibility
        function toggleFilters() {
            filterSection.classList.toggle('collapsed');
            toggleFiltersBtn.textContent = filterSection.classList.contains('collapsed') ?
                'Show Filters' : 'Hide Filters';
        }

        // Display holidays with improved UI
     // Function to display holidays with the specific 2026 National Holiday badge logic
function displayHolidays(holidaysToDisplay) {
    const holidayContainer = document.getElementById('holidayContainer');
    holidayContainer.innerHTML = '';

    // As per your request, these 4 are the primary National Holidays for 2026
    const nationalHolidays = [
        "REPUBLIC DAY", 
        "MAY DAY / MAHARASHTRA DAY", 
        "INDEPENDENCE DAY", 
        "MAHATMA GANDHI JAYANTHI"
    ];

    if (holidaysToDisplay.length === 0) {
        holidayContainer.innerHTML = `<div class="no-results"><p>No holidays found.</p></div>`;
        return;
    }

    holidaysToDisplay.forEach(holiday => {
        const card = document.createElement('div');
        card.className = 'holiday-card';
        
        // Check if the current holiday name matches your National Holiday list
        const isNational = nationalHolidays.includes(holiday.name.toUpperCase());
        
        const regionsToShow = holiday.regions.sort((a, b) => regionOrder.indexOf(a) - regionOrder.indexOf(b));

        card.innerHTML = `
            <div class="holiday-header">
                <div class="holiday-day">${holiday.date} ${holiday.month} ${holiday.year}</div>
                <div class="holiday-date">${holiday.day}</div>
                ${isNational ? '<span class="national-badge">National Holiday</span>' : ''}
            </div>
            <div class="holiday-name">${holiday.name}</div>
            <div class="holiday-regions">
                ${regionsToShow.map(region => `
                    <span class="region-tag ${region === 'NSE' ? 'national' : ''}">
                        ${getDisplayName(region)}
                    </span>`).join('')}
            </div>
        `;
        holidayContainer.appendChild(card);
    });
}
