    <script>
        let locationMapping = {};
        let jobs = [];

        const jobTitles = [
            "Relationship Manager",
            "Customer Service Executive",
            "Stock Market Dealer"
        ];

        const stateDropdown = document.getElementById('state-dropdown');
        const cityDropdown = document.getElementById('city-dropdown');
        const branchDropdown = document.getElementById('branch-dropdown');
        const jobList = document.getElementById('job-list');
        const loadingMessage = document.getElementById('loadingMessage');

        // Fetch states and cities from API
        async function fetchStatesAndCities() {
            try {
                const response = await fetch('https://www.integratedindia.in/api/RBLAPIs.aspx', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Type: 'Contactus' })
                });
                const data = await response.json();

                // Build locationMapping from API response
                locationMapping = {};
                data.forEach(stateObj => {
                    const stateName = stateObj.state;
                    locationMapping[stateName] = {};
                    stateObj.cities.forEach(c => {
                        locationMapping[stateName][c.city] = c.branches.map(b => b.name);
                    });
                });

                // Populate state dropdown
                stateDropdown.innerHTML = '<option value="">Select State</option>';
                Object.keys(locationMapping).sort().forEach(state => {
                    const option = document.createElement('option');
                    option.value = state;
                    option.textContent = state.charAt(0).toUpperCase() + state.slice(1).toLowerCase();
                    stateDropdown.appendChild(option);
                });

                // Build jobs array
                jobs = [];
                for (const state in locationMapping) {
                    for (const city in locationMapping[state]) {
                        locationMapping[state][city].forEach(branch => {
                            jobTitles.forEach(title => {
                                jobs.push({
                                    title,
                                    education: "Graduate",
                                    experience: "Fresher and 1 Year",
                                    location: { state, city, branch }
                                });
                            });
                        });
                    }
                }
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        // Populate city dropdown based on state selection
        stateDropdown.addEventListener('change', () => {
            const selectedState = stateDropdown.value;
            cityDropdown.innerHTML = '<option value="">Select City</option>';
            branchDropdown.innerHTML = '<option value="">Select Branch</option>';
            if (locationMapping[selectedState]) {
                Object.keys(locationMapping[selectedState]).sort().forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city.charAt(0).toUpperCase() + city.slice(1).toLowerCase();
                    cityDropdown.appendChild(option);
                });
            }
        });

        // Populate branch dropdown based on city selection
        cityDropdown.addEventListener('change', () => {
            const selectedState = stateDropdown.value;
            const selectedCity = cityDropdown.value;
            branchDropdown.innerHTML = '<option value="">Select Branch</option>';
            if (locationMapping[selectedState] && locationMapping[selectedState][selectedCity]) {
                locationMapping[selectedState][selectedCity].sort().forEach(branch => {
                    const option = document.createElement('option');
                    option.value = branch;
                    option.textContent = branch.charAt(0).toUpperCase() + branch.slice(1).toLowerCase();
                    branchDropdown.appendChild(option);
                });
            }
        });

        // Load data on page load
        fetchStatesAndCities();

        // Sanitize title for file input id
        function sanitizeTitle(title) {
            return title.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
        }
        function filterJobs() {
            const selectedState = stateDropdown.value;
            const selectedCity = cityDropdown.value;
            const selectedBranch = branchDropdown.value;
            jobList.innerHTML = '';
            loadingMessage.style.display = 'block';

            if (!selectedState || !selectedCity || !selectedBranch) {
                jobList.innerHTML = '<p>Please select a state, city, and branch to view job listings.</p>';
                loadingMessage.style.display = 'none';
                return;
            }

            const filteredJobs = jobs.filter(job =>
                job.location.state === selectedState && job.location.city === selectedCity && job.location.branch === selectedBranch
            );
            // <p>Location: ${job.location.city}, ${job.location.state}</p>
            if (filteredJobs.length > 0) {
                filteredJobs.forEach(job => {
                    const jobElement = document.createElement('div');
                    const sanitizedTitle = sanitizeTitle(job.title);
                    jobElement.className = 'job';
                    jobElement.innerHTML = `
                <div class="job-header">
                    <h3>${job.title}</h3>
                    <div class="job-badges">
                        <span class="job-badge"><i class="fas fa-graduation-cap"></i> ${job.education}</span>
                        <span class="job-badge"><i class="fas fa-briefcase"></i> ${job.experience}</span>
                        <span class="job-badge"><i class="fas fa-map-marker-alt"></i> ${job.location.branch.charAt(0).toUpperCase() + job.location.branch.slice(1).toLowerCase()}, ${job.location.city.charAt(0).toUpperCase() + job.location.city.slice(1).toLowerCase()}</span>
                    </div>
                </div>
                <div class="job-actions">
                    <label for="file-${sanitizedTitle}" class="upload-btn"><i class="fas fa-paperclip me-2"></i> Upload Resume</label>
                    <input type="file" id="file-${sanitizedTitle}" style="display: none;" 
                           onchange="displayFileName(event, '${sanitizedTitle}', '${job.title}', '${job.education}', '${job.experience}', '${job.location.state}', '${job.location.city}', '${job.location.branch}')">
                    <span id="file-name-${sanitizedTitle}" class="file-name text-muted small text-center" style="word-break: break-all; max-width: 200px;"></span>
                    <button class="btn btn-two w-100" id="submit-btn-${sanitizedTitle}" style="display: none;" 
                        onclick="handleSubmit(event, '${sanitizedTitle}', '${job.title}', '${job.education}', '${job.experience}', '${job.location.state}', '${job.location.city}', '${job.location.branch}')">Apply Now</button>
                </div>
            `;
                    jobList.appendChild(jobElement);
                });
            } else {
                jobList.innerHTML = '<div class="no-jobs">No jobs found for the selected location.</div>';
            }

            loadingMessage.style.display = 'none';
        }

        // Display file name after uploading and show CAPTCHA input before the submit button
        function displayFileName(event, sanitizedTitle, title, education, experience, state, city, branch) {
            const fileInput = event.target;
            const fileNameDisplay = document.getElementById(`file-name-${sanitizedTitle}`);
            const file = fileInput.files[0];

            if (file) {
                const allowedTypes = ["image/png", "image/jpeg", "application/pdf"];
                if (!allowedTypes.includes(file.type)) {
                    alert("Only PDF,PNG and JPG files are allowed.");
                    fileInput.value = "";
                    fileNameDisplay.textContent = "";
                    return;
                }
                fileNameDisplay.textContent = file.name;

                // Show CAPTCHA section after file is uploaded
                const captchaContainer = document.createElement("div");
                captchaContainer.id = "captcha-container";
                captchaContainer.innerHTML = `
            <div class="captcha-container">
                <label for="captcha-input" class="fw-medium py-4">Enter CAPTCHA:</label>
                <span id="captcha" class="bg-gre px-2 fw-bold"></span>
                <input type="text" id="captcha-input" required />
                <span  class="reloder" id="reload-captcha" onclick="generateCaptcha()">⟳</span>
            </div>
        `;

                // Append CAPTCHA above the submit button
                const submitBtn = document.getElementById(`submit-btn-${sanitizedTitle}`);
                submitBtn.insertAdjacentElement("beforebegin", captchaContainer);

                // Show the submit button below CAPTCHA
                submitBtn.style.display = 'inline-block';

                // Generate CAPTCHA on file upload
                generateCaptcha();
            }
        }

        // Generate random CAPTCHA code
        function generateCaptcha() {
            const captchaCode = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById("captcha").textContent = captchaCode;
            document.getElementById("captcha-input").value = ""; // Clear input
        }

        // Handle form submission after CAPTCHA validation
        async function handleSubmit(event, sanitizedTitle, title, education, experience, state, city, branch) {
            event.preventDefault();

            const enteredCaptcha = document.getElementById("captcha-input").value;
            const displayedCaptcha = document.getElementById("captcha").textContent;

            if (enteredCaptcha !== displayedCaptcha) {
                alert("Incorrect CAPTCHA. Please try again.");
                generateCaptcha(); // Reload CAPTCHA
                return;
            }

            const fileInput = document.querySelector(`#file-${sanitizedTitle}`);
            const file = fileInput?.files[0];

            if (!file) {
                alert("Please upload a file before submitting.");
                return;
            }

            const allowedTypes = ["image/png", "image/jpeg", "application/pdf"];
            if (!allowedTypes.includes(file.type)) {
                alert("Only PDF,PNG and JPG files are allowed.");
                return;
            }

            const formData = new FormData();
            formData.append('firstName', education);
            formData.append('lastName', experience);
            formData.append('mobileNumber', "");
            formData.append('emailId', state);
            formData.append('jobApplyingFor', title);
            formData.append('message', city + ', ' + branch);
            formData.append('resumeUpload', file);
            formData.append('Mode', 'UPLOAD');
            formData.append('Type', 'CAREER');


            try {
                const response = await fetch(CareerApiUrl, {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    alert("Job submitted successfully!");
                    window.open("career.html");
                } else {
                    alert("Failed to submit job. Please try again.");
                }
            } catch (error) {
                console.error("Error submitting job:", error);
                alert("There was an error while submitting the job.");
            }
        }


    </script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const itemBars = document.querySelectorAll(".itemBar"); // Select all .itemBar elements

            const observerOptions = {
                threshold: 0.5, // Trigger when 50% of the element is visible
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add("animate"); // Add the animation class
                        observer.unobserve(entry.target); // Stop observing the element after animation
                    }
                });
            }, observerOptions);

            itemBars.forEach((itemBar) => observer.observe(itemBar)); // Observe each .itemBar
        });
    </script>
