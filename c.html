<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Planning Calculator</title>

    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --secondary: #059669;
            --error: #dc2626;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            color: var(--gray-800);
            background-color: var(--gray-50);
            padding: 2rem;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .calculator {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            background: white;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }
        
        .calculator-header {
            grid-column: 1 / -1;
            background: var(--gray-900);
            color: white;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--gray-700);
        }
        
        .calculator-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .calculator-header p {
            color: var(--gray-300);
            font-size: 0.875rem;
        }
        
        .input-section {
            padding: 1.5rem 2rem;
            border-right: 1px solid var(--gray-200);
        }
        
        .result-section {
            padding: 1.5rem 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 0.5rem;
        }
        
        .form-label span {
            color: var(--gray-500);
            font-weight: 400;
        }
        
        .input-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .input-container input[type="text"] {
            flex: 1;
            padding: 0.625rem 0.75rem;
            border: 1px solid var(--gray-300);
            border-radius: 0.375rem;
            font-size: 0.875rem;
            transition: all 0.15s ease;
        }
        
        .input-container input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .input-value {
            min-width: 6rem;
            text-align: right;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-700);
        }
        
        .input-slider {
            width: 100%;
            margin-top: 0.5rem;
            -webkit-appearance: none;
            height: 0.375rem;
            background: var(--gray-200);
            border-radius: 0.25rem;
            outline: none;
        }
        
        .input-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 1rem;
            height: 1rem;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .input-slider::-webkit-slider-thumb:hover {
            background: var(--primary-light);
            transform: scale(1.1);
        }
        
        .error-message {
            font-size: 0.75rem;
            color: var(--error);
            margin-top: 0.25rem;
            display: none;
        }
        
        .results {
            background: var(--gray-50);
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .results-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .results-title svg {
            width: 1.25rem;
            height: 1.25rem;
            color: var(--primary);
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-label {
            font-size: 0.875rem;
            color: var(--gray-600);
        }
        
        .result-value {
            font-weight: 600;
            color: var(--gray-900);
        }
        
        .chart-container {
            height: 300px;
            margin-top: 1.5rem;
        }
        
        .calculate-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .calculate-btn:hover {
            background: var(--primary-light);
        }
        
        .calculate-btn:active {
            transform: translateY(1px);
        }
        
        @media (max-width: 768px) {
            .calculator {
                grid-template-columns: 1fr;
            }
            
            .input-section {
                border-right: none;
                border-bottom: 1px solid var(--gray-200);
            }
        }
    </style>

					new Date().getTime(), event: 'gtm.js'

<body>
	<!-- Google Tag Manager (noscript) -->
	<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PT9GLCS" height="0" width="0"
			style="display:none;visibility:hidden"></iframe></noscript>

    <div class="container">
        <div class="calculator">
            <div class="calculator-header">
                <h1>Retirement Planning Calculator</h1>
                <p>Calculate your required savings to achieve financial independence</p>
            </div>
            
            <div class="input-section">
                <div class="form-group">
                    <label class="form-label">Current Savings <span>(₹)</span></label>
                    <div class="input-container">
                        <input type="text" id="CS_Txt" value="0">
                        <span class="input-value" id="CS_Value">₹0</span>
                    </div>
                    <input type="range" class="input-slider" id="CS_Range" min="0" max="10000000" step="10000" value="0">
                    <div class="error-message" id="CS_Txt_error"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Current Age <span>(years)</span></label>
                    <div class="input-container">
                        <input type="text" id="RA_Txt" value="30">
                        <span class="input-value" id="RA_Value">30</span>
                    </div>
                    <input type="range" class="input-slider" id="RA_Range" min="18" max="80" step="1" value="30">
                    <div class="error-message" id="RA_Txt_error"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Retirement Age <span>(years)</span></label>
                    <div class="input-container">
                        <input type="text" id="PA_Txt" value="60">
                        <span class="input-value" id="PA_Value">60</span>
                    </div>
                    <input type="range" class="input-slider" id="PA_Range" min="40" max="80" step="1" value="60">
                    <div class="error-message" id="PA_Txt_error"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Monthly Expenses <span>(₹)</span></label>
                    <div class="input-container">
                        <input type="text" id="RSP_Txt" value="30000">
                        <span class="input-value" id="RSP_Value">₹30,000</span>
                    </div>
                    <input type="range" class="input-slider" id="RSP_Range" min="1000" max="100000" step="1000" value="30000">
                    <div class="error-message" id="RSP_Txt_error"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Inflation Rate <span>(%)</span></label>
                    <div class="input-container">
                        <input type="text" id="RSR_Txt" value="6">
                        <span class="input-value" id="RSR_Value">6%</span>
                    </div>
                    <input type="range" class="input-slider" id="RSR_Range" min="0.1" max="20" step="0.1" value="6">
                    <div class="error-message" id="RSR_Txt_error"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Investment Growth <span>(%)</span></label>
                    <div class="input-container">
                        <input type="text" id="RSG_Txt" value="10">
                        <span class="input-value" id="RSG_Value">10%</span>
                    </div>
                    <input type="range" class="input-slider" id="RSG_Range" min="0.1" max="30" step="0.1" value="10">
                    <div class="error-message" id="RSG_Txt_error"></div>
                </div>
                
                <button class="calculate-btn" onclick="RS_Calc()">Calculate Retirement Plan</button>
            </div>
            
            <div class="result-section">
                <div class="results" id="Result_Container" style="display: none;">
                    <h3 class="results-title">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                        </svg>
                        Retirement Plan Summary
                    </h3>
                    
                    <div class="result-item">
                        <span class="result-label">Required Corpus</span>
                        <span class="result-value" id="SE_Cont">₹0</span>
                    </div>
                    
                    <div class="result-item">
                        <span class="result-label">Monthly Expenses at Retirement</span>
                        <span class="result-value" id="ME_Cont">₹0</span>
                    </div>
                    
                    <div class="result-item">
                        <span class="result-label">Monthly Savings Needed</span>
                        <span class="result-value" id="SR_Cont">₹0</span>
                    </div>
                </div>
                
                <div class="chart-container">
                    <canvas id="savingsChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js" defer ></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer ></script>
    
    <script>
        // Format number with commas
        function RupeeSeparator(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // Input validation function
        function isValidInput(elementId, min, max, fieldName) {
            const element = $("#" + elementId);
            const errorElement = $("#" + elementId + "_error");
            let value = element.val().replace(/,/g, "");
            value = Number(value);
            
            if (isNaN(value) || value < min || value > max) {
                errorElement.text(`Please enter a valid ${fieldName} between ${min} and ${max}`);
                errorElement.show();
                element.css("border-color", "var(--error)");
                return false;
            } else {
                errorElement.hide();
                element.css("border-color", "var(--gray-300)");
                return true;
            }
        }

        // Main calculation function
        $("#Result_Container").css("display", "none");
        
        function RS_Calc() {
            if (!isValidInput("CS_Txt", 1, 10000000, 'Current Savings if any')) { return false; }
            if (!isValidInput("RA_Txt", 18, 80, 'Your present age')) { return false; }
            if (!isValidInput("PA_Txt", 40, 80, 'What age do you plan to retire')) { return false; }
            if (!isValidInput("RSP_Txt", 1, 10000000, 'Current Monthly Expenses')) { return false; }
            if (!isValidInput("RSR_Txt", 0.1, 20.00, 'Inflation rate')) { return false; }
            if (!isValidInput("RSG_Txt", 0.1, 30.00, 'Growth Rate')) { return false; }

            var mytemp = $('#CS_Txt').val();
            mytemp = mytemp.replace(/,/g, "");
            var CS = Number(mytemp);

            var mytemp = $('#RA_Txt').val();
            mytemp = mytemp.replace(/,/g, "");
            var RA = Number(mytemp);

            mytemp = $('#PA_Txt').val();
            mytemp = mytemp.replace(/,/g, "");
            var PA = Number(mytemp);

            mytemp = $('#RSP_Txt').val();
            mytemp = mytemp.replace(/,/g, "");
            var RSP = Number(mytemp);

            mytemp = $('#RSR_Txt').val();
            mytemp = mytemp.replace(/,/g, "");
            var RSR = Number(mytemp);

            mytemp = $('#RSG_Txt').val();
            mytemp = mytemp.replace(/,/g, "");
            var RSG = Number(mytemp);
            
            var n = PA - RA; // Years to retirement
            var ir = (RSR / 100);
            var gr = (RSG / 100);
            
            var RES_MER = RSP * (Math.pow((1 + ir), n));
            var RES_SRR = (RES_MER * 12) / (gr);
            var RES_PS = CS * (Math.pow((1 + gr), n));
            var RES_P = RES_SRR - RES_PS;
            var RES_MS = (RES_P * (gr / 12)) / (Math.pow((1 + (gr / 12)), (n * 12)) - 1);
            
            // Display results
            $("#Result_Container").css("display", "block");
            $("#SE_Cont").html("₹" + RupeeSeparator(RES_SRR.toFixed(0).toString()));
            $("#ME_Cont").html("₹" + RupeeSeparator(RES_MER.toFixed(0).toString()));
            $("#SR_Cont").html("₹" + RupeeSeparator(RES_MS.toFixed(0).toString()));
            
            // Generate chart
            generateChart(CS, RES_MS, gr, n, RES_SRR);
        }

        // Chart generation function
        function generateChart(currentSavings, monthlySavings, growthRate, yearsToRetirement, retirementGoal) {
            const ctx = document.getElementById('savingsChart').getContext('2d');
            
            // Destroy previous chart if it exists
            if (window.savingsChart) {
                window.savingsChart.destroy();
            }
            
            // Prepare data for each year
            const labels = [];
            const savingsData = [];
            let totalSavings = currentSavings;
            
            for (let year = 1; year <= yearsToRetirement; year++) {
                labels.push(`Y${year}`);
                
                // Add monthly contributions and growth
                for (let month = 1; month <= 12; month++) {
                    totalSavings += monthlySavings;
                    totalSavings *= (1 + growthRate/12);
                }
                
                savingsData.push(totalSavings);
            }
            
            // Create chart
            window.savingsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Projected Savings',
                            data: savingsData,
                            borderColor: 'var(--primary)',
                            backgroundColor: 'rgba(37, 99, 235, 0.05)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.1
                        },
                        {
                            label: 'Retirement Goal',
                            data: Array(yearsToRetirement).fill(retirementGoal),
                            borderColor: 'var(--secondary)',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            fill: false,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                padding: 20
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ₹' + RupeeSeparator(Math.round(context.raw).toString());
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: {
                                drawBorder: false
                            },
                            ticks: {
                                callback: function(value) {
                                    return '₹' + RupeeSeparator(Math.round(value).toString());
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false
                            }
                        }
                    },
                    elements: {
                        point: {
                            radius: 0
                        }
                    }
                }
            });
        }

        // Auto-format currency inputs
        $(document).ready(function() {
            $('input[type="text"]').on('input', function() {
                let value = $(this).val().replace(/,/g, '');
                if (!isNaN(value)) {
                    $(this).val(RupeeSeparator(value));
                }
            });
            
            // Sync range sliders with number inputs
            function syncInputs(numberId, rangeId, valueId, isCurrency = false, isPercentage = false) {
                $(`#${numberId}, #${rangeId}`).on('input', function() {
                    const sourceId = $(this).attr('id');
                    let value = $(this).val();
                    
                    if (sourceId === rangeId) {
                        $(`#${numberId}`).val(value);
                    } else {
                        value = value.replace(/,/g, '');
                        $(`#${rangeId}`).val(value);
                    }
                    
                    let displayValue = value;
                    if (isCurrency) {
                        displayValue = '₹' + RupeeSeparator(value);
                    } else if (isPercentage) {
                        displayValue = value + '%';
                    }
                    
                    $(`#${valueId}`).text(displayValue);
                    
                    // Trigger calculation if the range is adjusted
                    if (sourceId === rangeId) {
                        RS_Calc();
                    }
                });
            }
            
            // Set up sync for all input pairs
            syncInputs('CS_Txt', 'CS_Range', 'CS_Value', true);
            syncInputs('RA_Txt', 'RA_Range', 'RA_Value');
            syncInputs('PA_Txt', 'PA_Range', 'PA_Value');
            syncInputs('RSP_Txt', 'RSP_Range', 'RSP_Value', true);
            syncInputs('RSR_Txt', 'RSR_Range', 'RSR_Value', false, true);
            syncInputs('RSG_Txt', 'RSG_Range', 'RSG_Value', false, true);
            
            // Initialize the calculator
            RS_Calc();
        });
    </script>
</body>
