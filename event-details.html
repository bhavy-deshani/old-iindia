<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details | STRI</title>
    <link rel="shortcut icon" type="image/x-icon" href="./assets/img/favicon.png" />
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./assets/css/animate.min.css" />


    <link rel="stylesheet" href="./assets/css/default.css" />
    <link rel="stylesheet" fetchpriority="high" href="./assets/css/main.css" />
    <script src="./assets/js/app-link.js" defer></script>
    <link rel="stylesheet" href="./assets/css/fresco.css" />
    <link rel="preload" as="image" href="./assets/img/bg/event.jpg" fetchpriority="high">

    <style>
        :root {
            --primary-dark: #1C355E;
            --primary-green: #00AE42;
            --primary-blue: #005CB9;
            --light-gray: #f8f9fa;
            --dark-gray: #343a40;
        }

        .event-hero {
            position: relative;
            margin-bottom: 40px;
        }

        .hero-image-container {
            height: 250px;
            width: 100%;
            overflow: hidden;
        }



        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(28, 53, 94, 0.9), transparent);
            padding: 80px 0 40px;
            color: white;
        }

        .event-badge {
            display: inline-block;
            background-color: #00AE42;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .event-title {
            font-weight: 700;
            margin-bottom: 25px;
            font-size: 2.5rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .event-meta-hero {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .meta-item-hero {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
        }

        .event-main-content {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            padding: 40px;
            padding-top: 50px;
            position: relative;
            z-index: 1;
        }

        .quick-info-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .info-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .info-card i {
            font-size: 1.8rem;
            color: #005CB9;
        }

        .info-card h4 {
            margin: 0;
            color: #1C355E;
            font-weight: 600;
        }

        .info-card p {
            margin: 5px 0 0;
            color: #6c757d;
            font-size: 0.9rem;
        }

        .event-section {
            margin-bottom: 50px;
        }

        .section-title {
            color: #1C355E;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .section-title i {
            color: #00AE42;
        }

        .section-subtitle {
            color: #6c757d;
            margin-bottom: 20px;
        }

        .event-description {
            line-height: 1.8;
            color: #495057;
        }

        .speakers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .speaker-card {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .speaker-image {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00AE42;
        }

        .speaker-info h4 {
            color: #1C355E;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .speaker-title {
            color: #005CB9;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .speaker-bio {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            border-radius: 8px;
            overflow: hidden;
            height: 200px;
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .hero-image-container {
                height: 400px;
            }

            .event-title {
                font-size: 2rem;
            }

            .event-main-content {
                padding: 25px;
            }

            .quick-info-cards {
                grid-template-columns: 1fr;
            }
        }

        .btn::after {
            content: "" !important;
            mask-image: url("");
            -webkit-mask-image: url("");
            -webkit-mask-size: contain;
        }.video-thumb {
    position: relative;
    cursor: pointer;
}

.play-icon {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    color: #fff;
    background: rgba(0,0,0,0.35);
}
.event-video {
    width: 100%;
    max-height: 70vh;   /* screen ka 70% */
    object-fit: contain;
    background: #000;
}

    </style>
</head>

<body>
    <main>

        <!-- Breadcrumb Area -->
        <section class="breadcrumb__area breadcrumb__bg" data-background="assets/img/bg/event.jpg">
            <script src="./assets/js/header.js" defer></script>
            <script src="./assets/js/footer.js" defer></script>
            <div class="container">
                <div class="row">
                    <div class="col-lg-6">
                        <div class="breadcrumb__content">
                            <h3 class="title">Past Event Highlights</h3>
                            <nav aria-label="breadcrumb">
                                <ol class="breadcrumb">
                                    <li class="breadcrumb-item"><a href="/">Home</a></li>
                                    <li class="breadcrumb-item"><a href="event.html">Events</a></li>
                                    <li class="breadcrumb-item active">Past Event Highlights</li>
                                </ol>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
            <div class="breadcrumb__shape">
                <img loading="lazy" src="./assets/img/images/breadcrumb_shape01.png" alt="Integrated" />
                <img loading="lazy" src="./assets/img/images/breadcrumb_shape02.png" alt="Integrated"
                    class="rightToLeft" />
                <!-- <img loading="lazy" src="./assets/img/images/breadcrumb_shape03.png" alt="Integrated" /> -->
                <img loading="lazy" src="./assets/img/images/breadcrumb_shape04.png" alt="Integrated" />

            </div>
        </section>
        <section class="blog__details-area">
            <div class="event-details-container">

                <!-- Main Content Section -->
                <div class="container">
                    <div class="event-main-content">
                        <div class="row pb-5">
                            <div class="col-lg-10 mx-auto text-center">
                                <h1 id="event-title" class="event-title">Event Title</h1>
                                <div class="event-meta-hero">
                                    <div class="meta-item-hero">
                                        <i class="fas fa-calendar-alt"></i>
                                        <span id="event-date">June 15, 2025</span>
                                    </div>
                                    <div class="meta-item-hero">
                                        <i class="fas fa-map-marker-alt"></i>
                                        <span id="event-location">Conference Center, Mumbai</span>
                                    </div>
                                    <div class="meta-item-hero">
                                        <i class="fas fa-clock"></i>
                                        <span id="event-time">10:00 AM - 4:00 PM</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Event Description -->
                        <div class="event-section">
                            <h2 class="section-title">
                                <i class="fas fa-info-circle me-2"></i>
                                About This Event
                            </h2>
                            <div id="event-description" class="event-description">
                                <p>Event description will be loaded here...</p>
                            </div>
                        </div>


                        <!-- Gallery Section -->
                        <div class="event-section">
                            <h2 class="section-title">
                                <i class="fas fa-images me-2"></i>
                                Event Gallery
                            </h2>
                            <p class="section-subtitle">Relive the memorable moments from this event</p>
                            <div id="photo-gallery" class="gallery-grid">
                                <!-- Photos will be inserted here by JavaScript -->
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="action-buttons">
                            <a href="event.html" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-2"></i> Back to Events
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
<div class="modal fade" id="videoModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark">
      <div class="modal-body p-0">
       <video id="eventVideo"
       controls
       muted
       playsinline
       class="event-video">
    <source src="" type="video/mp4">
</video>

      </div>
    </div>
  </div>
</div>

    </main>
    <script src="./assets/js/vendor/jquery-3.6.0.min.js" defer></script>
    <script src="./assets/js/bootstrap.bundle.min.js" defer></script>
    <script src="./assets/js/p9_language.js" defer></script>
    <script src="./assets/js/main.js" fetchpriority="high" defer></script>
    <script src="./assets/js/chatbot.js" defer></script>
    <script src="./assets/js/vendor/fresco.min.js" defer></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Get the event data from the URL parameters
            const urlParams = new URLSearchParams(window.location.search);

            const eventTitle = decodeURIComponent(urlParams.get('title') || 'Event Title');
            const eventDate = decodeURIComponent(urlParams.get('date') || '');
            const eventLocation = decodeURIComponent(urlParams.get('location') || '');
            const eventTime = decodeURIComponent(urlParams.get('time') || 'Not specified');
            const eventDescription = decodeURIComponent(urlParams.get('description') || '');
            const eventImage = decodeURIComponent(urlParams.get('image') || '');
            const eventId = urlParams.get('id');

            // Set basic text content
            document.getElementById('event-title').textContent = eventTitle;
            document.getElementById('event-date').textContent = formatDate(eventDate);
            document.getElementById('event-location').textContent = eventLocation;
            document.getElementById('event-time').textContent = eventTime.replace(/<br>/g, ' | '); // Replace line breaks with separator
            document.getElementById('event-description').innerHTML = eventDescription;

            // Set hero image if available
            if (eventImage && document.getElementById('event-hero-image')) {
                document.getElementById('event-hero-image').src = eventImage;
            }

            // Load event-specific gallery images
            const photoGallery = document.getElementById('photo-gallery');

            const galleryMap = {
                '1': Array.from({ length: 31 }, (_, i) => `./assets/img/stri-events/chennai-${i + 1}.jpg`),
                '2': Array.from({ length: 6 }, (_, i) => `./assets/img/stri-events/thanjavur-${i + 1}.png`),
                '3': Array.from({ length: 11 }, (_, i) => `./assets/img/stri-events/gujarat-${i + 1}.png`),
                '4': Array.from({ length: 3 }, (_, i) => `./assets/img/stri-events/kolkata_${i + 1}.jpg`),
                '5': Array.from({ length: 18 }, (_, i) => `./assets/img/stri-events/belgaum-${i + 1}.jpg`),
                '6': Array.from({ length: 20 }, (_, i) => `./assets/img/stri-events/kerala_event_${i + 1}.jpg`),
                '7': Array.from({ length: 9 }, (_, i) => `./assets/img/stri-events/vadodara_${i + 1}.jpg`),
                '8': Array.from({ length: 8 }, (_, i) => `./assets/img/stri-events/ahmedabad_${i + 1}.jpg`),
                '10': Array.from({ length: 10 }, (_, i) => `./assets/img/stri-events/delhi_${i + 2}.jpg`),
                '12': Array.from({ length: 14 }, (_, i) => `./assets/img/stri-events/gokhale_school_mumbai_${i + 1}.jpg`),
                '13': Array.from({ length: 15 }, (_, i) => `./assets/img/stri-events/mirch_masala_kolkata_${i + 2}.jpg`),
                '14': Array.from({ length: 6 }, (_, i) => `./assets/img/stri-events/chennai-webinar-${i + 1}.jpg`),
                '19': Array.from({ length: 7 }, (_, i) => `./assets/img/stri-events/surat_${i + 1}.jpg`),
                '22': Array.from({ length: 15 }, (_, i) => `./assets/img/stri-events/diamond_delhi_${i + 1}.jpg`),
                '23': Array.from({ length: 14 }, (_, i) => `./assets/img/stri-events/rajkot_${i + 1}.jpg`),
                '28': Array.from({ length: 6 }, (_, i) => `./assets/img/stri-events/chennai-legacy-uilding-${i + 1}.jpeg`),
                '33': Array.from({ length: 9 }, (_, i) => `./assets/img/stri-events/stri-event-${i + 14}.jpeg`),
                '34': [
                    // Images
                    ...Array.from({ length: 6 }, (_, i) => ({
                        type: 'image',
                        src: `./assets/img/stri-events/stri-event-${i + 5}.jpeg`
                    })),

                    // Video
                    {
                        type: 'video',
                        src: './assets/img/stri-events/stri-event-11.mp4',
                        poster: './assets/img/stri-events/poster-3.jpg'
                    },
                    {
                        type: 'video',
                        src: './assets/img/stri-events/stri-event-12.mp4',
                        poster: './assets/img/stri-events/poster-2.jpg'
                    },
                    {
                        type: 'video',
                        src: './assets/img/stri-events/stri-event-13.mp4',
                        poster: './assets/img/stri-events/poster-1.jpg'
                    }
                ],
                '35': Array.from({ length: 4 }, (_, i) => `./assets/img/stri-events/event-${i + 1}.jpeg`),
                '37': Array.from({ length: 20 }, (_, i) => `./assets/img/stri-events/chennai-stri-event-${i + 1}.jpg`),
                '38': Array.from({ length: 21 }, (_, i) => `./assets/img/stri-events/ahmedabad-stri-event-${i + 1}.jpg`),

            };

            const gallery = galleryMap[eventId] || [

            ];

       gallery.forEach((item) => {

    /* ======================
       IMAGE (STRING URL)
    ====================== */
    if (typeof item === 'string') {
        photoGallery.innerHTML += `
            <div class="gallery-item">
                <a href="${item}"
                   class="fresco"
                   data-fresco-group="event-gallery-${eventId}">
                    <img src="${item}" alt="${eventTitle}">
                </a>
            </div>
        `;
    }

    /* ======================
       IMAGE (OBJECT)
    ====================== */
    else if (item.type === 'image') {
        photoGallery.innerHTML += `
            <div class="gallery-item">
                <a href="${item.src}"
                   class="fresco"
                   data-fresco-group="event-gallery-${eventId}">
                    <img src="${item.src}" alt="${eventTitle}">
                </a>
            </div>
        `;
    }

    /* ======================
       VIDEO (MODAL)
    ====================== */
    else if (item.type === 'video') {
        photoGallery.innerHTML += `
            <div class="gallery-item video-thumb"
                 data-bs-toggle="modal"
                 data-bs-target="#videoModal"
                 data-video="${item.src}">
                 
                <img src="${item.poster}" alt="Event Video">
                <span class="play-icon">▶</span>
            </div>
        `;
    }

});


            // Initialize Bootstrap tooltips
            if (typeof bootstrap !== 'undefined' && bootstrap.Tooltip) {
                const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
                tooltipTriggerList.map(function (tooltipTriggerEl) {
                    return new bootstrap.Tooltip(tooltipTriggerEl);
                });
            }
        });

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString(undefined, options);
        }

        function formatCategory(category) {
            if (!category) return 'General';
            return category.split('-').map(word =>
                word.charAt(0).toUpperCase() + word.slice(1)
            ).join(' ');
        }const videoModal = document.getElementById('videoModal');
const videoEl = document.getElementById('eventVideo');

videoModal.addEventListener('show.bs.modal', function (e) {
    const thumb = e.relatedTarget;
    const videoSrc = thumb.getAttribute('data-video');
    videoEl.src = videoSrc;
    videoEl.play();
});

videoModal.addEventListener('hidden.bs.modal', function () {
    videoEl.pause();
    videoEl.currentTime = 0;
    videoEl.src = '';
});

    </script>

</body>

</html>
