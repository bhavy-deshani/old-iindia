	<script>
		document.addEventListener("DOMContentLoaded", function () {
			const urlParams = new URLSearchParams(window.location.search);
			const memberId = urlParams.get("id"); // Get the ID of the team member from the URL

			if (memberId !== null) {
				fetch("assets/js/board_of_directors.json")
					.then((response) => response.json())
					.then((data) => {
						const member = data[memberId]; // Get the team member from the data using the ID

						// Update the page with the team member's details
						document.getElementById("team-member-image").src = member.image || "assets/img/default.png";
						document.getElementById("team-member-name").textContent = member.name || "Unnamed Member";
						document.getElementById("team-member-position").textContent = member.position || "Position Unavailable";

						// Render multiple paragraphs for the description
						const descriptionElement = document.getElementById("team-member-description");
						descriptionElement.innerHTML = ""; // Clear existing content
						if (Array.isArray(member.description)) {
							member.description.forEach(paragraph => {
								const p = document.createElement("p");
								p.textContent = paragraph; // Add each paragraph text
								descriptionElement.appendChild(p); // Append the paragraph to the container
							});
						}

						document.getElementById("team-member-phone").textContent = member.phone || "Phone not available";
						document.getElementById("team-member-phone").href = `tel:${member.phone || ''}`;
						document.getElementById("team-member-email").textContent = member.email || "Email not available";
						document.getElementById("team-member-email").href = `mailto:${member.email || ''}`;
						document.getElementById("team-member-address").textContent = member.address || "Address not available";

						// Populate social links if available
						const socialContainer = document.getElementById("team-member-social");
						if (member.social) {
							socialContainer.innerHTML = Object.keys(member.social)
								.map(platform => {
									return `<li><a href="${member.social[platform]}" target="_blank"><i class="fab fa-${platform}"></i></a></li>`;
								})
								.join('');
						}
					})
					.catch((error) => {
						console.error("Error loading team data:", error);
					});
			} else {
				document.querySelector(".team__details-area").innerHTML = "<p>Invalid team member ID.</p>";
			}
		});
	</script>
